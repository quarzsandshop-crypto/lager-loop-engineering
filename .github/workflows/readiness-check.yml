name: Lager readiness-check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  readiness-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run readiness-check
        run: npm run readiness-check
